<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
  <title>Implicit Association Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #unity-container { width: 100%; height: 100%; position: relative; }
    #unity-canvas { display: block; width: 100%; height: 100%; }
    #unity-loading-bar {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: none;
    }
    #unity-progress-bar-empty { width: 200px; height: 10px; background: #333; border-radius: 5px; }
    #unity-progress-bar-full { height: 100%; background: #ff0; border-radius: 5px; }
    #unity-warning { position: absolute; top: 0; left: 0; right: 0; z-index: 10; }
    #unity-footer { display: none; }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-warning"></div>
  </div>

  <script>
    function unityShowBanner(msg, type) {
      var warningBanner = document.querySelector("#unity-warning");
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      }
      var div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type == 'error') div.style.background = 'red';
      else {
        if (type == 'warning') div.style.background = 'yellow';
        setTimeout(function() {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }
      updateBannerVisibility();
    }

    var config = {
        dataUrl: "Build/IAT.data",
        frameworkUrl: "Build/IAT.framework.js",
        codeUrl: "Build/IAT.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "skrininshot",
        productName: "IAT",
        productVersion: "1.0",
        showBanner: unityShowBanner,
    };

    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = "IAT.loader.js";
    script.onload = () => {
      createUnityInstance(document.querySelector("#unity-canvas"), config, (progress) => {
        progressBarFull.style.width = 100 * progress + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";
      }).catch((message) => {
        alert(message);
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
