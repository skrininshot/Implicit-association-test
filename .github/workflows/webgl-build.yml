name: Build WebGL and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Unity
        uses: game-ci/unity-setup@v2
        with:
          unityVersion: 2022.3.62f3

      - name: Activate Unity License
        run: |
          echo "$UNITY_LICENSE" | base64 --decode > /tmp/Unity_lic.ulf
          mkdir -p /root/.config/unity3d/Unity
          cp /tmp/Unity_lic.ulf /root/.config/unity3d/Unity/Unity_lic.ulf
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

      - name: Build WebGL
        run: |
          unity-editor -batchmode -quit -nographics \
            -projectPath . \
            -buildTarget WebGL \
            -executeMethod BuildCommand.BuildWebGL \
            -logFile - || true
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

      - name: Create .nojekyll
        run: touch build/WebGL/WebGL/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/WebGL/WebGL
          publish_branch: gh-pages
          keep_files: false