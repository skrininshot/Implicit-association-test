name: Deploy WebGL to Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.62f3
          targetPlatform: WebGL
          buildName: IAT

      - name: Flatten nested Build folder if present
  run: |
    if [ -d "build/WebGL/IAT/Build" ]; then
      echo "Moving contents from build/WebGL/IAT/Build to build/WebGL/IAT..."
      shopt -s dotglob
      mv build/WebGL/IAT/Build/* build/WebGL/IAT/
      rmdir build/WebGL/IAT/Build
    fi
  continue-on-error: true
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/WebGL/IAT
          publish_branch: gh-pages
          keep_files: false
          force_orphan: true