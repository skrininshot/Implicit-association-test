<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Implicit Association Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        body { display: flex; justify-content: center; align-items: center; }
        canvas { display: block; width: 100% !important; height: 100% !important; object-fit: fill; }
    </style>
</head>
<body>
    <canvas id="unity-canvas"></canvas>
    <script src="{{.BuildName}}.loader.js"></script>
    <script>
        createUnityInstance(document.querySelector("#unity-canvas"), {
            dataUrl: "{{.BuildName}}.data",
            frameworkUrl: "{{.BuildName}}.framework.js",
            codeUrl: "{{.BuildName}}.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "{{.CompanyName}}",
            productName: "{{.ProductName}}",
            productVersion: "{{.ProductVersion}}",
        }).then((unityInstance) => {
            console.log("Unity loaded");
        });
    </script>
</body>
</html>
